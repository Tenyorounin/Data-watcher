name: scheduled-job

on:
  schedule:
    - cron: '0 16 * * 1,2,3,4,5,6,7'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-task:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: install deps
        run: |
          cd app
          npm install

      - name: install browser
        run: |
          cd app
          npx playwright install --with-deps chromium

      - name: run task
        run: |
          cd app
          node main.js

      - name: build page
        run: |
          cd app
          node render.js

      - name: commit results
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add app/data.json docs/index.html
          git commit -m "update data" || echo "no changes"
          git push
